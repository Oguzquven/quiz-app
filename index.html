<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JS QUİZ</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- EKRAN 1: Başlangıç -->
    <div id="screen-start" class="screen">
      <h1>JavaSript Quiz</h1>
      <p>10 soru. Her soru için 15 saniye</p>
      <button id="btn-start">Başla</button>
    </div>

    <!-- EKRAN 2: Soru -->
    <div id="screen-quiz" class="screen hidden">
      <div id="quiz-header">
        <span id="question-count">Soru 1 / 10</span>
        <span id="timer">15</span>
      </div>
      <h2 id="question-text"></h2>
      <div id="options-container"></div>
    </div>

    <!-- EKRAN 3: Sonuç -->
    <div id="screen-result" class="screen hidden">
      <h2>Sonuç</h2>
      <p id="score-text"></p>
      <div id="high-score-text"></div>
      <button id="btn-restart">Tekrar Oyna</button> ✅
    </div>

    <script src="app.js"></script>
  </body>
</html>
